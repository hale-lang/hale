name: docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "play/**"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "docs/**"
      - "play/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# Pages deployment requires these tokens.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one in-flight Pages deploy at a time; cancel queued runs
# but never interrupt a deploy already publishing.
concurrency:
  group: pages
  cancel-in-progress: false

env:
  LLVM_SYS_180_PREFIX: /usr/lib/llvm-18

jobs:
  build:
    name: Build site (docs + playground)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # --- docs (mdBook) ---
      - name: Cache cargo binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/mdbook
            ~/.cargo/bin/mdbook-toc
          key: mdbook-${{ runner.os }}-v1

      - name: Install mdbook + preprocessors
        run: |
          set -e
          for tool in mdbook mdbook-toc; do
            if ! command -v "$tool" >/dev/null 2>&1; then
              cargo install --locked "$tool"
            fi
          done

      # GH #228: every ```hale snippet in docs/src must parse
      # (deliberately-partial blocks are fenced ```hale,fragment).
      # The gate also runs in the main test shards as part of the
      # hale-syntax suite; running it here too makes a docs-only
      # PR fail fast without waiting on the full suite.
      - name: Docs snippet parse gate
        run: cargo test --release -p hale-syntax --test docs_snippets

      - name: Build docs
        run: mdbook build docs

      # --- playground: compile the examples + the Hale UI to wasm ---
      # Heavy (LLVM 18 + a compiler build), so skip it on PRs — it runs
      # only on main / manual dispatch, i.e. when we actually deploy.
      - name: Install Rust toolchain
        if: github.event_name != 'pull_request'
        uses: dtolnay/rust-toolchain@stable

      - name: Install LLVM 18 + clang
        if: github.event_name != 'pull_request'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            llvm-18-dev libpolly-18-dev libzstd-dev \
            clang-18 libclang-18-dev zlib1g-dev

      - name: Cache cargo (compiler build)
        if: github.event_name != 'pull_request'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-pages-${{ runner.os }}-llvm18-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-pages-${{ runner.os }}-llvm18-

      - name: Build the hale compiler
        if: github.event_name != 'pull_request'
        run: cargo build --release -p hale-cli

      - name: Build the playground (examples + UI -> wasm)
        if: github.event_name != 'pull_request'
        run: bash play/build.sh

      - name: Stage the playground under the docs site (/play)
        if: github.event_name != 'pull_request'
        run: cp -r play/site docs/book/play

      # --- publish the combined site ---
      - name: Configure Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/book

      # mdbook-admonish + mdbook-linkcheck deferred — each has a
      # compat issue with mdbook 0.5.x. Re-add when upstream catches up.

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
