name: release

# Build platform-native `hale` binaries on tag pushes (`v*`) and
# attach them to a GitHub Release. The intent is that "stable v1"
# users `curl` a tarball instead of installing LLVM 18 +
# the Rust toolchain themselves — sidesteps the recurring
# macOS-LLVM-zstd / clock_nanosleep / cross-toolchain churn that
# every first-time Mac contributor hits.
#
# Trigger: any tag starting with `v` (e.g. `v1.0`, `v0.0.1`,
# `v1.0-rc1`). `workflow_dispatch` lets a maintainer kick off a
# manual run for ad-hoc builds (useful for smoke-testing the
# workflow itself before tagging).
#
# Two matrix entries cover the practical surface:
#   - Linux x86_64 (ubuntu-latest)
#   - macOS Apple Silicon arm64 (macos-14)
#
# Intel Mac (x86_64-apple-darwin / macos-13) was dropped 2026-05-27.
# Two reasons: (1) the macos-13 runner is being sunset by GitHub —
# its homebrew bottles for `llvm@18` are degrading, and a missing
# bottle forces brew to build LLVM from source on the runner
# (multi-hour hangs that no longer represent a working release
# path). (2) Apple Silicon has been the dominant Mac platform
# since 2020; Intel-Mac users can run the arm64 binary via
# Rosetta 2 with no functional difference for our workload. Add
# native Intel back if/when a downstream consumer asks.
#
# Linux arm64 (aarch64-unknown-linux-gnu) is covered on a native
# GitHub-hosted `ubuntu-24.04-arm` runner — added 2026-07-16 for
# aarch64 Linux servers (AWS Graviton / EKS arm64 nodes, Ampere).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# Re-pushing the same tag (common during a stabilization push)
# auto-cancels the in-flight run so a fresh one isn't stuck
# behind it in the scarce macos runner queue.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write          # creating releases + uploading assets

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            llvm-prefix: /usr/lib/llvm-18
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            llvm-prefix: /usr/lib/llvm-18
          - os: macos-14
            target: aarch64-apple-darwin
            llvm-prefix: /opt/homebrew/opt/llvm@18
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          # LLVM version is baked into the cache key — bumping
          # `LLVM_SYS_180_PREFIX` to a different major needs a new
          # cache, since llvm-sys rebuilds against the new ABI.
          key: cargo-${{ matrix.target }}-llvm18-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ matrix.target }}-llvm18-

      - name: Install LLVM (Linux)
        if: runner.os == 'Linux'
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y \
            llvm-18-dev libpolly-18-dev libzstd-dev \
            clang-18 libclang-18-dev zlib1g-dev

      - name: Install LLVM (macOS)
        if: runner.os == 'macOS'
        run: |
          set -eux
          brew update
          # llvm@18 transitively brings zstd, but we install zstd
          # explicitly to guard against the formula's deps shifting.
          brew install llvm@18 zstd

      - name: Build release binary
        env:
          LLVM_SYS_180_PREFIX: ${{ matrix.llvm-prefix }}
        run: |
          set -eux
          # --workspace (not --bin hale) so libhale_ts_shim.a is also
          # built — codegen needs it beside the binary to link programs.
          cargo build --release --workspace

      - name: Vendor libunwind (macOS)
        if: runner.os == 'macOS'
        run: |
          set -eux
          # GH #231: the binary links Homebrew llvm@18's
          # libunwind.1.dylib; without Homebrew llvm@18 installed
          # it crashes at launch. Vendor the dylib beside the
          # binary and rewrite the load command to
          # @executable_path so the tarball is self-contained
          # (the .dylib ships in the archive next to `hale`).
          BIN=target/release/hale
          # Vendor EVERY non-system dylib (libunwind, libzstd, and
          # anything the formulas grow next), then fix the vendored
          # dylibs' own load commands + install ids. Two passes over
          # the dylib set handles dylib-to-dylib references.
          vendor_dir="$(dirname "$BIN")"
          for pass in 1 2; do
            for f in "$BIN" "$vendor_dir"/*.dylib; do
              [ -e "$f" ] || continue
              for LIB in $(otool -L "$f" | awk '/\/opt\/homebrew|\/usr\/local\/Cellar/ {print $1}'); do
                base="$(basename "$LIB")"
                [ -e "$vendor_dir/$base" ] || cp "$LIB" "$vendor_dir/$base"
                install_name_tool -change "$LIB" "@executable_path/$base" "$f"
              done
            done
          done
          for d in "$vendor_dir"/*.dylib; do
            [ -e "$d" ] || continue
            install_name_tool -id "@executable_path/$(basename "$d")" "$d"
            codesign --force --sign - "$d"
          done
          codesign --force --sign - "$BIN"
          # Audit: nothing outside /usr/lib + @executable_path may
          # remain across the binary AND the vendored dylibs.
          for f in "$BIN" "$vendor_dir"/*.dylib; do
            [ -e "$f" ] || continue
            if otool -L "$f" | grep -E "/opt/homebrew|/usr/local/Cellar"; then
              echo "non-system dylib dependency survived in $f" >&2
              exit 1
            fi
          done

      - name: Smoke-test the binary
        run: |
          set -eux
          # If the binary built but is somehow broken, fail loud
          # before uploading. `--help` exits non-zero in our CLI
          # (usage-on-stderr convention) so we just verify the
          # binary runs at all.
          ./target/release/hale || true
          file ./target/release/hale

      - name: Package binary
        id: package
        run: |
          set -eux
          mkdir -p dist
          tarball="hale-${{ github.ref_name }}-${{ matrix.target }}.tar.gz"
          # Include LICENSE + README alongside the binary; both
          # become first-class in the user-visible tarball.
          cp target/release/hale dist/
          # libhale_ts_shim.a MUST ship beside the binary: codegen
          # path-probes $(dirname current_exe)/libhale_ts_shim.a to link
          # any program using std::io. Omitting it (the pre-2026-07 bug)
          # shipped tarballs that could not build real programs.
          cp target/release/libhale_ts_shim.a dist/
          # GH #231: the vendored libunwind (macOS only — see the
          # Vendor step) rides beside the binary; the rewritten
          # @executable_path load command finds it there.
          cp -v target/release/*.dylib dist/ 2>/dev/null || true
          cp -v README.md dist/ 2>/dev/null || true
          cp -v LICENSE-MIT dist/ 2>/dev/null || true
          cp -v LICENSE-APACHE dist/ 2>/dev/null || true
          tar -czf "$tarball" -C dist .
          echo "tarball=$tarball" >> "$GITHUB_OUTPUT"
          shasum -a 256 "$tarball" | tee "$tarball.sha256"

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: hale-${{ matrix.target }}
          path: |
            ${{ steps.package.outputs.tarball }}
            ${{ steps.package.outputs.tarball }}.sha256
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    # Only run for tag pushes; workflow_dispatch builds artifacts
    # but doesn't create a release (used for smoke-testing the
    # pipeline).
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4    # for release-notes auto-gen

      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true       # flatten into one dist/ dir

      - name: Create release + upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.sha256
          generate_release_notes: true
          fail_on_unmatched_files: true
          # Mark pre-1.0 tags as pre-releases automatically. Once
          # we ship v1.0+, this evaluates false and tags become
          # full releases.
          prerelease: ${{ contains(github.ref_name, '-') || startsWith(github.ref_name, 'v0.') }}
