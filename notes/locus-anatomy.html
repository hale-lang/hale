<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aperio · A Pond Ecosystem</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0e1b1f;
  --panel: #142a30;
  --panel-2: #102025;
  --border: #1f3a42;
  --text: #e8d8c0;
  --muted: #87a0a6;
  --dim: #5a7378;
  --lotus: #f4a3b8;
  --gold: #d4a943;
  --mint: #8fd3c4;
  --sky: #a3d8ff;
  --peach: #ffa37a;
  --violet: #b9a3ff;
  --amber: #ffd394;
  --olive: #c2e088;
  --rose: #e094c2;
  --header-h: 92px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  min-height: 100vh;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at 18% 28%, rgba(244, 163, 184, 0.04) 0%, transparent 42%),
    radial-gradient(circle at 82% 72%, rgba(143, 211, 196, 0.03) 0%, transparent 44%);
  pointer-events: none;
  z-index: 0;
}

header {
  position: sticky;
  top: 0;
  padding: 18px 40px 14px;
  border-bottom: 1px solid var(--border);
  background: rgba(14, 27, 31, 0.92);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  z-index: 10;
}

header h1 {
  font-size: 22px;
  font-weight: 500;
  letter-spacing: -0.01em;
  margin-bottom: 3px;
}

header h1 .lotus {
  display: inline-block;
  font-size: 24px;
  margin-right: 6px;
  transform: translateY(1px);
}

.subtitle {
  color: var(--muted);
  font-size: 13px;
  max-width: 760px;
}

main {
  position: relative;
  z-index: 1;
  display: grid;
  grid-template-columns: minmax(0, 1fr) 380px;
  gap: 28px;
  padding: 24px 40px;
  max-width: 1500px;
  margin: 0 auto;
  align-items: start;
}

#code-col { display: flex; flex-direction: column; gap: 16px; }

.section {
  background: var(--panel-2);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  scroll-margin-top: calc(var(--header-h) + 16px);
  transition: box-shadow 200ms ease, border-color 200ms ease;
}

.section.active {
  border-color: rgba(244, 163, 184, 0.4);
  box-shadow: 0 0 0 2px rgba(244, 163, 184, 0.12);
}

.section-head {
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(180deg, rgba(244, 163, 184, 0.04), transparent);
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 12px;
}

.section-title {
  font-family: 'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace;
  font-size: 13px;
  font-weight: 500;
  color: var(--lotus);
  letter-spacing: 0;
}

.section-blurb {
  font-size: 11.5px;
  color: var(--muted);
  font-style: italic;
  text-align: right;
  flex: 1;
}

pre.code {
  padding: 18px 24px;
  font-family: 'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace;
  font-size: 13px;
  line-height: 1.7;
  overflow-x: auto;
  tab-size: 4;
  white-space: pre;
  margin: 0;
}

.chunk {
  transition: background-color 160ms ease;
  border-radius: 2px;
  display: inline;
}

.chunk.highlight {
  background: rgba(244, 163, 184, 0.16);
  box-shadow: 0 0 0 1px rgba(244, 163, 184, 0.25);
}

/* Syntax tokens */
.cmt   { color: var(--dim); font-style: italic; }
.str   { color: var(--olive); }
.fstr  { color: var(--olive); }
.num   { color: var(--rose); }
.annot { color: var(--gold); font-weight: 500; }
.op    { color: var(--muted); }
.punct { color: var(--muted); }
.ident { color: var(--text); }
.kw-decl     { color: var(--lotus); font-weight: 500; }
.kw-lifecycle{ color: var(--mint); font-weight: 500; }
.kw-flow     { color: var(--violet); }
.kw-store    { color: var(--gold); }
.kw-bus      { color: var(--sky); }
.kw-closure  { color: var(--sky); }
.kw-annot    { color: var(--gold); }
.kw-fallible { color: var(--peach); font-weight: 500; }
.kw-recovery { color: var(--peach); }
.kw-mode     { color: var(--violet); font-weight: 500; }
.kw-lit      { color: var(--rose); }
.type        { color: var(--amber); }

/* Sidebar */
aside#sidebar {
  position: sticky;
  top: calc(var(--header-h) + 16px);
  max-height: calc(100vh - var(--header-h) - 32px);
  overflow-y: auto;
  padding-right: 4px;
}

aside#sidebar::-webkit-scrollbar { width: 6px; }
aside#sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.panel {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 14px;
  margin-bottom: 12px;
}

.panel-title {
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--lotus);
  font-weight: 600;
  margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}

/* Locus tree */
.tree-row {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 5px 6px;
  margin: 1px -2px;
  border-radius: 4px;
  cursor: pointer;
  transition: background 120ms ease, color 120ms ease;
  font-family: 'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace;
  font-size: 12px;
}

.tree-row:hover { background: rgba(244, 163, 184, 0.08); }
.tree-row .tree-pre { color: var(--dim); }
.tree-row .tree-name { color: var(--amber); font-weight: 500; }
.tree-row .tree-note {
  font-family: -apple-system, system-ui, sans-serif;
  font-size: 10.5px;
  color: var(--muted);
  font-style: italic;
  margin-left: auto;
}
.tree-row.active { background: rgba(244, 163, 184, 0.13); }
.tree-row.active .tree-name { color: var(--lotus); }

/* Feature cards */
.cat-header {
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted);
  font-weight: 600;
  margin: 12px 0 4px;
  padding-top: 4px;
}

.cat-header:first-child { margin-top: 0; padding-top: 0; }

.feat {
  padding: 6px 8px;
  margin: 2px -4px;
  border-radius: 4px;
  cursor: pointer;
  transition: background 120ms ease;
}

.feat:hover { background: rgba(244, 163, 184, 0.08); }

.feat-name {
  font-size: 12.5px;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 2px;
  font-family: 'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace;
}

.feat-desc {
  font-size: 11px;
  color: var(--muted);
  line-height: 1.4;
}

.feat-where {
  font-size: 10px;
  color: var(--dim);
  margin-top: 3px;
  font-family: 'JetBrains Mono', monospace;
}

.feat.highlight {
  background: rgba(244, 163, 184, 0.13);
  box-shadow: inset 2px 0 0 var(--lotus);
}

.feat.speculative .feat-name::after {
  content: 'design space';
  font-size: 9px;
  font-weight: 500;
  background: rgba(212, 169, 67, 0.18);
  color: var(--gold);
  padding: 1px 6px;
  border-radius: 8px;
  margin-left: 8px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  font-family: -apple-system, system-ui, sans-serif;
}

/* Color key */
.legend-row {
  display: flex;
  flex-wrap: wrap;
  gap: 5px 8px;
}

.legend-row span {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
  padding: 1px 6px;
  border-radius: 3px;
  background: var(--bg);
}

.intro {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px 20px;
  font-size: 13px;
  color: var(--muted);
  line-height: 1.55;
}

.intro strong { color: var(--text); font-weight: 500; }
.intro code { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--lotus); background: var(--bg); padding: 1px 5px; border-radius: 3px; }

@media (max-width: 1100px) {
  main { grid-template-columns: 1fr; }
  aside#sidebar { position: relative; top: 0; max-height: none; }
}
</style>
</head>
<body>

<header>
  <h1><span class="lotus">🪷</span>Aperio · A Pond Ecosystem</h1>
  <p class="subtitle">A small ecosystem expressed as nested loci. The whole language fits in here — hover a feature on the right to find it; click a locus to jump to its declaration.</p>
</header>

<main>
  <div id="code-col"></div>
  <aside id="sidebar"></aside>
</main>

<script>
// ============================================================
// SECTIONS — each rendered as its own panel in the code column.
// Inside a section, chunks carry feat tags so the sidebar can
// highlight them.
// ============================================================
const sections = [
  {
    id: 'wire-types',
    title: 'wire types',
    blurb: 'plain records — fields only, no methods',
    chunks: [
      { feat: 'types', src:
        'type RainEvent {\n' +
        '    intensity: Decimal;\n' +
        '    when: Time;\n' +
        '}\n\n' +
        'type DroughtEvent {\n' +
        '    duration: Duration;\n' +
        '    when: Time;\n' +
        '}\n\n' +
        'type BloomEvent {\n' +
        '    pad_id: Int;\n' +
        '    intensity: Decimal;\n' +
        '    when: Time;\n' +
        '}\n\n' +
        'type RibbitEvent {\n' +
        '    frog_id: Int;\n' +
        '    pitch: Decimal;\n' +
        '    when: Time;\n' +
        '}\n\n' +
        '// Error payloads carried by `fallible(E)`\n' +
        'type PondFull   { current: Int; cap: Int; }\n' +
        'type NoSuchPad  { id: Int; }\n\n' +
        '// Wire shape of a Pond perspective\n' +
        'type PondSnapshot {\n' +
        '    water_level:   Decimal;\n' +
        '    pad_count:     Int;\n' +
        '    blossom_count: Int;\n' +
        '    observed_at:   Time;\n' +
        '}\n'
      },
    ],
  },

  {
    id: 'insect',
    title: 'locus Insect',
    blurb: 'a leaf — no children, no bus, just state and a method',
    chunks: [
      { feat: 'locus-decl', src: 'locus Insect {\n' },
      { feat: 'params', src:
        '    params {\n' +
        '        species: String;\n' +
        '        spawned_at: Time = now();\n' +
        '    }\n\n'
      },
      { feat: 'methods', src:
        '    fn age() -> Duration {\n' +
        '        now() - self.spawned_at\n' +
        '    }\n'
      },
      { feat: 'locus-decl', src: '}\n' },
    ],
  },

  {
    id: 'blossom',
    title: 'locus Blossom',
    blurb: 'shows the birth lifecycle — log emitted on creation',
    chunks: [
      { feat: 'locus-decl', src: 'locus Blossom {\n' },
      { feat: 'params', src:
        '    params {\n' +
        '        pad_id: Int;\n' +
        '        intensity: Decimal = 1.0d;\n' +
        '        emitted_at: Time = now();\n' +
        '    }\n\n'
      },
      { feat: 'birth', src:
        '    birth {\n' +
        '        log(f"blossom from pad {self.pad_id}");\n' +
        '    }\n\n'
      },
      { feat: 'methods', src:
        '    fn fade() {\n' +
        '        self.intensity = self.intensity * 0.5d;\n' +
        '    }\n'
      },
      { feat: 'locus-decl', src: '}\n' },
    ],
  },

  {
    id: 'frog',
    title: 'locus Frog',
    blurb: 'capacity + bus + closure — a fuller state machine',
    chunks: [
      { feat: 'locus-decl', src: 'locus Frog' },
      { feat: 'annotations', src: ' : schedule cooperative' },
      { feat: 'locus-decl', src: ' {\n' },
      { feat: 'params', src:
        '    params {\n' +
        '        id: Int;\n' +
        '        hunger: Decimal = 0.0d;\n' +
        '        pitch: Decimal = 1.0d;\n' +
        '    }\n\n'
      },
      { feat: 'capacity', src:
        '    capacity {\n' +
        '        pool stomach of Insect;\n' +
        '    }\n\n'
      },
      { feat: 'bus', src:
        '    bus {\n' +
        '        publish "frog.ribbit" of type RibbitEvent as ribbit;\n' +
        '    }\n\n'
      },
      { feat: 'closure', src:
        '    closure rest_satiation {\n' +
        '        hunger ~~ 0.5d within 0.4d;\n' +
        '        epoch tick;\n' +
        '    }\n\n'
      },
      { feat: 'birth', src:
        '    birth {\n' +
        '        "frog.ribbit" <- RibbitEvent {\n' +
        '            frog_id: self.id, pitch: self.pitch, when: now()\n' +
        '        };\n' +
        '    }\n\n'
      },
      { feat: 'run', src:
        '    run {\n' +
        '        self.hunger = self.hunger + 0.01d;\n' +
        '    }\n\n'
      },
      { feat: 'methods', src:
        '    fn eat(bug: Insect) {\n' +
        '        self.hunger = self.hunger - 0.2d;\n' +
        '    }\n\n'
      },
      { feat: 'dissolve', src:
        '    dissolve {\n' +
        '        log(f"frog {self.id} returns to the mud");\n' +
        '    }\n'
      },
      { feat: 'locus-decl', src: '}\n' },
    ],
  },

  {
    id: 'pad',
    title: 'locus Pad',
    blurb: 'contract + on_failure — routes frog failures locally',
    chunks: [
      { feat: 'locus-decl', src: 'locus Pad' },
      { feat: 'annotations', src: ' : projection rich, schedule cooperative' },
      { feat: 'locus-decl', src: ' {\n' },
      { feat: 'params', src:
        '    params {\n' +
        '        id: Int;\n' +
        '        vitality: Decimal = 1.0d;\n' +
        '        last_bloom: Time = now();\n' +
        '    }\n\n'
      },
      { feat: 'contract', src:
        '    contract {\n' +
        '        expose vitality: Decimal;\n' +
        '        consume sunlight: Decimal;\n' +
        '    }\n\n'
      },
      { feat: 'capacity', src:
        '    capacity {\n' +
        '        heap visitors of Frog as_parent_for Frog;\n' +
        '    }\n\n'
      },
      { feat: 'closure', src:
        '    closure not_drowning {\n' +
        '        vitality ~~ 1.0d within 0.5d;\n' +
        '        epoch tick;\n' +
        '    }\n\n'
      },
      { feat: 'methods', src:
        '    fn tick() {\n' +
        '        self.vitality = self.vitality * 0.99d;\n' +
        '    }\n\n' +
        '    fn seal() {\n' +
        '        log(f"pad {self.id} sealed");\n' +
        '    }\n\n'
      },
      { feat: 'on_failure', src:
        '    on_failure(child: Frog, err: Error) {\n' +
        '        match err.kind {\n' +
        '            "starvation" -> restart(child) until self.vitality > 0.5d,\n' +
        '            "drowning"   -> dissolve(child),\n' +
        '            _            -> bubble(err),\n' +
        '        }\n' +
        '    }\n'
      },
      { feat: 'locus-decl', src: '}\n' },
    ],
  },

  {
    id: 'pond',
    title: 'locus Pond',
    blurb: '@form(vec) + perspective + modes + fallibility — the main coordinator',
    chunks: [
      { feat: 'form', src: '@form(vec)\n' },
      { feat: 'locus-decl', src: 'locus Pond' },
      { feat: 'annotations', src: ' : tier 2, projection rich, schedule pinned(core=0)' },
      { feat: 'locus-decl', src: ' {\n' },
      { feat: 'params', src:
        '    params {\n' +
        '        name: String = "still-pond";\n' +
        '        water_level: Decimal = 1.0d;\n' +
        '        max_pads: Int = 64;\n' +
        '        bloom_threshold: Decimal = 0.7d;\n' +
        '    }\n\n'
      },
      { feat: 'contract', src:
        '    contract {\n' +
        '        expose water_level: Decimal;\n' +
        '        expose pad_count:   Int;\n' +
        '        consume rainfall:   Decimal;\n' +
        '    }\n\n'
      },
      { feat: 'capacity', src:
        '    capacity {\n' +
        '        heap pads     of Pad     as_parent_for Pad;\n' +
        '        pool blossoms of Blossom;\n' +
        '    }\n\n'
      },
      { feat: 'bus', src:
        '    bus {\n' +
        '        subscribe "weather.rain"    as on_rain    of type RainEvent;\n' +
        '        subscribe "weather.drought" as on_drought of type DroughtEvent;\n' +
        '        publish   "pond.bloom"      of type BloomEvent as bloom_out;\n' +
        '    }\n\n'
      },
      { feat: 'closure', src:
        '    closure water_persistence {\n' +
        '        water_level ~~ 1.0d within 0.2d;\n' +
        '        epoch tick;\n' +
        '        persists_through (on_rain);\n' +
        '        resets_on (on_drought);\n' +
        '    }\n\n'
      },
      { feat: 'birth', src:
        '    birth {\n' +
        '        log(f"pond {self.name} forming");\n' +
        '    }\n\n'
      },
      { feat: 'accept', src:
        '    accept(child: Pad) {\n' +
        '        if self.pads.len() >= self.max_pads {\n' +
        '            quarantine(child);\n' +
        '        }\n' +
        '    }\n\n'
      },
      { feat: 'run', src:
        '    run {\n' +
        '        for pad in self.pads {\n' +
        '            pad.tick();\n' +
        '        }\n' +
        '    }\n\n'
      },
      { feat: 'on_failure', src:
        '    on_failure(child: Locus, err: Error) {\n' +
        '        match err.kind {\n' +
        '            "drought" -> restart(child) until water_level > 0.5d,\n' +
        '            "rot"     -> dissolve(child),\n' +
        '            _         -> bubble(err),\n' +
        '        }\n' +
        '    }\n\n'
      },
      { feat: 'modes', src:
        '    mode bulk -> Int {\n' +
        '        self.pads.len()\n' +
        '    }\n\n' +
        '    mode harmonic -> Decimal {\n' +
        '        average_vitality()\n' +
        '    }\n\n' +
        '    mode resolution(pad_id: Int) -> Pad fallible(NoSuchPad) {\n' +
        '        self.get_pad(pad_id) or raise\n' +
        '    }\n\n'
      },
      { feat: 'fallible', src:
        '    fn add_pad(seed: Seed) -> Pad fallible(PondFull) {\n' +
        '        if self.pads.len() >= self.max_pads {\n' +
        '            fail PondFull { current: self.pads.len(), cap: self.max_pads };\n' +
        '        }\n' +
        '        let pad = Pad { id: next_id() };\n' +
        '        self.pads.push(pad);\n' +
        '        pad\n' +
        '    }\n\n'
      },
      { feat: 'hint', src: '    @hint(rarely_fails)\n' },
      { feat: 'fallible', src:
        '    fn get_pad(i: Int) -> Pad fallible(NoSuchPad) {\n' +
        '        self.pads.get(i) or raise\n' +
        '    }\n\n' +
        '    fn safe_get_pad(i: Int) -> Pad {\n' +
        '        self.pads.get(i) or default_pad()\n' +
        '    }\n\n'
      },
      { feat: 'drain', src:
        '    drain {\n' +
        '        for pad in self.pads {\n' +
        '            pad.seal();\n' +
        '        }\n' +
        '    }\n\n'
      },
      { feat: 'dissolve', src:
        '    dissolve {\n' +
        '        log(f"pond {self.name} returns to soil");\n' +
        '    }\n'
      },
      { feat: 'locus-decl', src: '}\n' },
    ],
  },

  {
    id: 'cloud',
    title: 'locus Cloud',
    blurb: 'a separate locus that publishes weather onto the bus',
    chunks: [
      { feat: 'locus-decl', src: 'locus Cloud' },
      { feat: 'annotations', src: ' : schedule pinned(core=1)' },
      { feat: 'locus-decl', src: ' {\n' },
      { feat: 'params', src:
        '    params {\n' +
        '        mood: String = "calm";\n' +
        '    }\n\n'
      },
      { feat: 'bus', src:
        '    bus {\n' +
        '        publish "weather.rain"    of type RainEvent    as rain_out;\n' +
        '        publish "weather.drought" of type DroughtEvent as drought_out;\n' +
        '    }\n\n'
      },
      { feat: 'run', src:
        '    run {\n' +
        '        match self.mood {\n' +
        '            "stormy"  -> "weather.rain"    <- RainEvent    { intensity: 2.0d, when: now() },\n' +
        '            "parched" -> "weather.drought" <- DroughtEvent { duration: 1h,    when: now() },\n' +
        '            _ -> yield,\n' +
        '        }\n' +
        '    }\n'
      },
      { feat: 'locus-decl', src: '}\n' },
    ],
  },

  {
    id: 'garden',
    title: 'locus Garden',
    blurb: '@form(vec) — a locus of ponds. Recursive nesting.',
    chunks: [
      { feat: 'form', src: '@form(vec)\n' },
      { feat: 'locus-decl', src: 'locus Garden {\n' },
      { feat: 'params', src:
        '    params {\n' +
        '        keeper: String;\n' +
        '    }\n\n'
      },
      { feat: 'capacity', src:
        '    capacity {\n' +
        '        heap ponds of Pond as_parent_for Pond;\n' +
        '    }\n\n'
      },
      { feat: 'methods', src:
        '    fn add_pond(name: String) -> Pond {\n' +
        '        let p = Pond { name: name };\n' +
        '        self.ponds.push(p);\n' +
        '        p\n' +
        '    }\n'
      },
      { feat: 'locus-decl', src: '}\n' },
    ],
  },

  {
    id: 'perspective',
    title: 'perspective GardenerView',
    blurb: 'a serializable read view — same schema across binaries',
    chunks: [
      { feat: 'perspective', src:

// ============================================================
// Tokenizer
// ============================================================
const keywordClasses = {
  'kw-decl': new Set([
    'locus','perspective','type','fn','let','const','mut','self',
    'params','contract','capacity','closure','bus','mode',
    'on_failure','module','interface','import'
  ]),
  'kw-lifecycle': new Set(['birth','accept','run','drain','dissolve']),
  'kw-flow': new Set([
    'if','else','match','for','while','return','break','continue',
    'in','fail','until','when','yield'
  ]),
  'kw-store': new Set(['pool','heap','of','expose','consume','as_parent_for']),
  'kw-bus': new Set(['subscribe','publish','as']),
  'kw-closure': new Set([
    'within','approx','epoch','persists_through','resets_on',
    'tick','duration','explicit','stable_when','serialize_as'
  ]),
  'kw-annot': new Set([
    'tier','projection','schedule','rich','chunked','recognition',
    'cooperative','pinned','core'
  ]),
  'kw-fallible': new Set(['fallible','or','raise']),
  'kw-recovery': new Set(['restart','restart_in_place','quarantine','reorganize','bubble']),
  'kw-mode': new Set(['bulk','harmonic','resolution']),
  'kw-lit': new Set(['true','false','nil']),
  'type': new Set([
    'Int','Uint','Float','Decimal','String','Bool','Time','Duration','Bytes',
    'Locus','Error',
    'Insect','Blossom','Frog','Pad','Pond','Cloud','Garden','Seed',
    'RainEvent','DroughtEvent','BloomEvent','RibbitEvent',
    'PondFull','NoSuchPad','IndexError','PondSnapshot','GardenerView'
  ]),
};

function classifyIdent(word) {
  for (const cls in keywordClasses) {
    if (keywordClasses[cls].has(word)) return cls;
  }
  if (/^[A-Z][a-zA-Z0-9_]*$/.test(word)) return 'type';
  return 'ident';
}

const tokenPatterns = [
  ['cmt',   /\/\/[^\n]*/y],
  ['fstr',  /f"(?:[^"\\]|\\.)*"/y],
  ['str',   /"(?:[^"\\]|\\.)*"/y],
  ['num',   /\d+(?:\.\d+)?(?:d|h|m|s|ms|us|ns)?\b/y],
  ['annot', /@[a-zA-Z_]\w*/y],
  ['op',    /<-|->|~~|<=|>=|==|!=|&&|\|\||::/y],
  ['op',    /[+\-*/%&|^!<>=]/y],
  ['punct', /[{}()\[\];,.:]/y],
  ['ident', /[a-zA-Z_]\w*/y],
  ['ws',    /\s+/y],
];

function tokenize(src) {
  const out = [];
  let i = 0;
  while (i < src.length) {
    let matched = false;
    for (const [type, re] of tokenPatterns) {
      re.lastIndex = i;
      const m = re.exec(src);
      if (m && m.index === i) {
        const text = m[0];
        let cls;
        if (type === 'ws') cls = null;
        else if (type === 'ident') cls = classifyIdent(text);
        else cls = type;
        out.push({ text, cls });
        i += text.length;
        matched = true;
        break;
      }
    }
    if (!matched) {
      out.push({ text: src[i], cls: null });
      i++;
    }
  }
  return out;
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderTokens(tokens) {
  return tokens.map(t => {
    if (!t.cls) return escapeHtml(t.text);
    return '<span class="' + t.cls + '">' + escapeHtml(t.text) + '</span>';
  }).join('');
}

function renderCode() {
  const col = document.getElementById('code-col');
  col.innerHTML = sections.map(sec => {
    const body = sec.chunks.map(c =>
      '<span class="chunk" data-feat="' + c.feat + '">' +
        renderTokens(tokenize(c.src)) +
      '</span>'
    ).join('');
    return '<div class="section" id="sec-' + sec.id + '" data-locus="' + sec.id + '">' +
      '<div class="section-head">' +
        '<span class="section-title">' + escapeHtml(sec.title) + '</span>' +
        '<span class="section-blurb">' + escapeHtml(sec.blurb) + '</span>' +
      '</div>' +
      '<pre class="code">' + body + '</pre>' +
    '</div>';
  }).join('');
}

// ============================================================
// Interaction
// ============================================================
function highlightFeat(feat, on) {
  document.querySelectorAll('.chunk[data-feat="' + feat + '"]').forEach(el => {
    el.classList.toggle('highlight', on);
  });
  document.querySelectorAll('.feat[data-feat="' + feat + '"]').forEach(el => {
    el.classList.toggle('highlight', on);
  });
}

function jumpToLocus(id) {
  const target = document.getElementById('sec-' + id);
  if (!target) return;
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  target.classList.add('active');
  target.scrollIntoView({ behavior: 'smooth', block: 'start' });
  setTimeout(() => target.classList.remove('active'), 1800);
}

function wireInteractions() {
  document.querySelectorAll('.feat').forEach(el => {
    const feat = el.dataset.feat;
    el.addEventListener('mouseenter', () => highlightFeat(feat, true));
    el.addEventListener('mouseleave', () => highlightFeat(feat, false));
  });
  document.querySelectorAll('.chunk').forEach(el => {
    const feat = el.dataset.feat;
    if (!feat) return;
    el.addEventListener('mouseenter', () => highlightFeat(feat, true));
    el.addEventListener('mouseleave', () => highlightFeat(feat, false));
  });
  document.querySelectorAll('.tree-row').forEach(el => {
    el.addEventListener('click', () => {
      document.querySelectorAll('.tree-row').forEach(r => r.classList.remove('active'));
      el.classList.add('active');
      jumpToLocus(el.dataset.jump);
    });
  });
}

function updateHeaderOffset() {
  const h = document.querySelector('header').offsetHeight;
  document.documentElement.style.setProperty('--header-h', h + 'px');
}
