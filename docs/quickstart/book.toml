[book]
title = "The Aperio Quickstart"
authors = ["Riley Rook"]
description = "Five-minute tour: install, run hello-world, know where to go from here."
language = "en"
src = "src"

[output.html]
default-theme = "light"
preferred-dark-theme = "navy"
git-repository-url = "local"
edit-url-template = ""
no-section-label = false

[output.html.fold]
enable = true
level = 1

[output.html.search]
enable = true
limit-results = 30
teaser-word-count = 30
use-boolean-and = true
boost-title = 2
boost-hierarchy = 1
boost-paragraph = 1
expand = true
heading-split-level = 3

[preprocessor.toc]
command = "mdbook-toc"
renderer = ["html"]
