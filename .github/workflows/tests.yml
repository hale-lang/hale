name: tests

# Runs the full workspace test suite on every push (to any branch)
# and on every pull request targeting main. Pushing a feature
# branch is enough to delegate a full test run — no PR required.
# Linux-only at v1; the release workflow exercises macOS coverage
# at tag time.
#
# Uses cargo-nextest (drop-in replacement for `cargo test`) for
# smarter scheduling: each test runs in its own process, so the
# shared `/tmp/lotus_test_*` paths that historically required
# `--test-threads=1` no longer collide. Workspace-wide test time
# drops ~2-3x vs libtest.
#
# Partition-then-fanout shape: one `build` job compiles + archives
# the workspace test binaries; N parallel `test` jobs each run a
# hash-partitioned subset of the archive. Total wall-clock drops
# from ~7min to ~3min at the cost of ~2-3x CI minutes (separate
# runner boot per partition). Worth it for branch-iteration
# velocity.

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel an in-flight run on the same branch when a new push lands;
# tests on the older commit are already stale.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  LLVM_SYS_180_PREFIX: /usr/lib/llvm-18

jobs:
  build:
    name: build + archive
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-tests-x86_64-linux-llvm18-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-tests-x86_64-linux-llvm18-

      - name: Install LLVM 18 + clang
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y \
            llvm-18-dev libpolly-18-dev libzstd-dev \
            clang-18 libclang-18-dev zlib1g-dev

      - name: Install cargo-nextest
        # Prebuilt binary — installs in seconds vs ~2min for
        # `cargo install`.
        uses: taiki-e/install-action@nextest

      - name: cargo build --release --workspace
        # Build ALL workspace members first so `libhale_ts_shim.a`
        # lands at `target/release/` before any test that links
        # against it runs. `hale-cli` and `hale-codegen` tests
        # invoke clang to link compiled .hl fixtures — codegen
        # appends the staticlib by path-probe (no cargo dep edge
        # forces it), so a fresh checkout that goes straight to
        # `cargo test` misses the artifact and fails with
        # `undefined reference to lotus_ts_*`.
        run: cargo build --release --workspace

      - name: cargo nextest archive
        # Bundles all compiled test binaries + workspace metadata
        # into a zstd-compressed tarball. Test runners unpack and
        # execute without rebuilding. Fixtures referenced via
        # CARGO_MANIFEST_DIR are remapped at the test side via
        # `--workspace-remap` if needed; on Actions runners both
        # phases check out to the same path so no remap is
        # required.
        run: |
          cargo nextest archive \
            --archive-file tests.tar.zst \
            --release --workspace

      - name: Upload nextest archive
        uses: actions/upload-artifact@v4
        with:
          name: nextest-archive
          path: tests.tar.zst
          retention-days: 1

      - name: Upload runtime artifacts
        # `libhale_ts_shim.a` is needed by codegen tests that
        # invoke clang to link compiled `.hl` programs. nextest
        # archive doesn't include arbitrary build outputs, so the
        # staticlib goes as a separate artifact.
        uses: actions/upload-artifact@v4
        with:
          name: runtime-artifacts
          path: target/release/libhale_ts_shim.a
          retention-days: 1

  test:
    name: test ${{ matrix.partition }}/4
    needs: build
    runs-on: ubuntu-latest
    strategy:
      # Don't short-circuit other partitions on first failure —
      # we want to see the full failure picture across the suite.
      fail-fast: false
      matrix:
        partition: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v4
        # Tests reference fixture files under
        # `crates/*/tests/fixtures/` via CARGO_MANIFEST_DIR-rooted
        # paths. Checkout to the same directory the build runner
        # used so the paths align.

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install LLVM 18 + clang
        # Test runners need libLLVM.so.18 at runtime (llvm-sys
        # links dynamically) AND clang-18 for the
        # compile-Hale-test invocations.
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y \
            llvm-18-dev libpolly-18-dev libzstd-dev \
            clang-18 libclang-18-dev zlib1g-dev

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Download nextest archive
        uses: actions/download-artifact@v4
        with:
          name: nextest-archive

      - name: Download runtime artifacts
        uses: actions/download-artifact@v4
        with:
          name: runtime-artifacts
          path: target/release

      - name: cargo nextest run (partition ${{ matrix.partition }}/4)
        # `hash:I/N` deterministically partitions by test name —
        # same test always lands on the same partition across
        # runs, so a flake is reproducible to its partition.
        #
        # `--extract-to .` unpacks the archive into the workspace
        # root (target/release/ etc.) rather than nextest's default
        # temp dir, so `CARGO_BIN_EXE_hale` (baked at compile
        # time to the workspace's target/release/hale path)
        # resolves on the test runner. `--extract-overwrite`
        # allows the staticlib downloaded by the previous step at
        # target/release/ to be replaced or preserved during
        # extraction without aborting.
        run: |
          cargo nextest run \
            --archive-file tests.tar.zst \
            --extract-to . \
            --extract-overwrite \
            --partition hash:${{ matrix.partition }}/4

  # 2026-05-26 — TSAN regression coverage for the lockfree
  # substrate paths. F.32-1γ-v2 + the substrate-race-fixes work
  # closed five originally-flagged TSAN races
  # (bus_queue_drain multi-thread flag, arena subregion mutex,
  # arena_destroy / coop_pool_worker ordering, lazy-init env
  # helpers via pthread_once) — the lockfree hashmap path
  # validates clean with an empty suppression list. This job
  # locks that in: any future regression that re-races on the
  # lockfree set / get / remove / grow paths fails CI here.
  #
  # Separate job because TSAN-instrumented binaries are ~5-15×
  # slower; running the full workspace under TSAN would gate
  # PRs on 30+ minute CI. The dedicated suite at
  # `crates/hale-codegen/tests/form_hashmap_lockfree_tsan.rs`
  # covers the substrate paths we care about + completes in
  # under a minute.
  tsan:
    name: tsan (form_hashmap_lockfree)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-tsan-x86_64-linux-llvm18-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-tsan-x86_64-linux-llvm18-

      - name: Install LLVM 18 + clang
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y \
            llvm-18-dev libpolly-18-dev libzstd-dev \
            clang-18 libclang-18-dev zlib1g-dev

      - name: cargo build --release --workspace
        # Build the whole workspace so `libhale_ts_shim.a` lands
        # at target/release/ before the test binaries try to
        # link against it — codegen tests invoke clang to link
        # compiled .hl programs, and the link surface includes
        # the ts-shim by path-probe (no cargo dep edge forces
        # it, so `-p hale-codegen` alone misses the staticlib
        # and clang errors with `undefined reference to lotus_ts_*`).
        run: cargo build --release --workspace

      - name: LOTUS_TSAN=1 cargo test (form_hashmap_lockfree_tsan)
        # The TSAN tests are #[ignore]'d so the normal suite
        # skips them; --ignored opts in. LOTUS_TSAN=1 in env
        # tells `build_executable` to pass -fsanitize=thread to
        # clang for both the runtime C compile and the binary
        # link. The C runtime's embedded
        # __tsan_default_suppressions returns empty as of
        # 2026-05-26 — any race surfaced here is a new
        # regression and gates the merge.
        env:
          LOTUS_TSAN: "1"
        run: |
          cargo test --release -p hale-codegen \
            --test form_hashmap_lockfree_tsan \
            -- --ignored --test-threads=1 --nocapture
