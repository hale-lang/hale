<svg xmlns="http://www.w3.org/2000/svg" width="803" height="574" viewBox="0 0 803 574" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace" font-size="13.5">
<rect width="803" height="574" rx="8" fill="#0d1117"/>
<text xml:space="preserve" x="16" y="29.0"><tspan fill="#ff7b72">main</tspan> <tspan fill="#ff7b72">locus</tspan> <tspan fill="#ffa657">App</tspan> <tspan fill="#c9d1d9">{</tspan></text>
<text xml:space="preserve" x="16" y="50.0">    <tspan fill="#ff7b72">params</tspan> <tspan fill="#c9d1d9">{</tspan></text>
<text xml:space="preserve" x="16" y="71.0">        <tspan fill="#c9d1d9">region_us</tspan><tspan fill="#c9d1d9">:</tspan> <tspan fill="#ffa657">GameRegion</tspan>     <tspan fill="#c9d1d9">=</tspan> <tspan fill="#ffa657">GameRegion</tspan> <tspan fill="#c9d1d9">{</tspan> <tspan fill="#c9d1d9">name</tspan><tspan fill="#c9d1d9">:</tspan> <tspan fill="#a5d6ff">&quot;us-east&quot;</tspan> <tspan fill="#c9d1d9">}</tspan><tspan fill="#c9d1d9">;</tspan></text>
<text xml:space="preserve" x="16" y="92.0">        <tspan fill="#c9d1d9">region_eu</tspan><tspan fill="#c9d1d9">:</tspan> <tspan fill="#ffa657">GameRegion</tspan>     <tspan fill="#c9d1d9">=</tspan> <tspan fill="#ffa657">GameRegion</tspan> <tspan fill="#c9d1d9">{</tspan> <tspan fill="#c9d1d9">name</tspan><tspan fill="#c9d1d9">:</tspan> <tspan fill="#a5d6ff">&quot;eu-west&quot;</tspan> <tspan fill="#c9d1d9">}</tspan><tspan fill="#c9d1d9">;</tspan></text>
<text xml:space="preserve" x="16" y="113.0">        <tspan fill="#c9d1d9">sessions</tspan><tspan fill="#c9d1d9">:</tspan>  <tspan fill="#ffa657">SessionWorkers</tspan> <tspan fill="#c9d1d9">=</tspan> <tspan fill="#ffa657">SessionWorkers</tspan> <tspan fill="#c9d1d9">{</tspan> <tspan fill="#c9d1d9">}</tspan><tspan fill="#c9d1d9">;</tspan></text>
<text xml:space="preserve" x="16" y="134.0">        <tspan fill="#c9d1d9">metrics</tspan><tspan fill="#c9d1d9">:</tspan>   <tspan fill="#ffa657">MetricsServer</tspan>  <tspan fill="#c9d1d9">=</tspan> <tspan fill="#ffa657">MetricsServer</tspan> <tspan fill="#c9d1d9">{</tspan> <tspan fill="#c9d1d9">port</tspan><tspan fill="#c9d1d9">:</tspan> <tspan fill="#79c0ff">9100</tspan> <tspan fill="#c9d1d9">}</tspan><tspan fill="#c9d1d9">;</tspan></text>
<text xml:space="preserve" x="16" y="155.0">        <tspan fill="#c9d1d9">admin</tspan><tspan fill="#c9d1d9">:</tspan>     <tspan fill="#ffa657">AdminConsole</tspan>   <tspan fill="#c9d1d9">=</tspan> <tspan fill="#ffa657">AdminConsole</tspan> <tspan fill="#c9d1d9">{</tspan> <tspan fill="#c9d1d9">}</tspan><tspan fill="#c9d1d9">;</tspan></text>
<text xml:space="preserve" x="16" y="176.0">    <tspan fill="#c9d1d9">}</tspan></text>
<text xml:space="preserve" x="16" y="197.0"></text>
<text xml:space="preserve" x="16" y="218.0">    <tspan fill="#ff7b72">placement</tspan> <tspan fill="#c9d1d9">{</tspan></text>
<text xml:space="preserve" x="16" y="239.0">        <tspan fill="#c9d1d9">region_us</tspan><tspan fill="#c9d1d9">:</tspan> <tspan fill="#ff7b72">pinned</tspan><tspan fill="#c9d1d9">(</tspan><tspan fill="#ff7b72">core</tspan> <tspan fill="#c9d1d9">=</tspan> <tspan fill="#79c0ff">1</tspan><tspan fill="#c9d1d9">)</tspan><tspan fill="#c9d1d9">;</tspan>                       <tspan fill="#8b949e">// its own core</tspan></text>
<text xml:space="preserve" x="16" y="260.0">        <tspan fill="#c9d1d9">region_eu</tspan><tspan fill="#c9d1d9">:</tspan> <tspan fill="#ff7b72">pinned</tspan><tspan fill="#c9d1d9">(</tspan><tspan fill="#ff7b72">core</tspan> <tspan fill="#c9d1d9">=</tspan> <tspan fill="#79c0ff">2</tspan><tspan fill="#c9d1d9">)</tspan><tspan fill="#c9d1d9">;</tspan>                       <tspan fill="#8b949e">// a sibling, on another</tspan></text>
<text xml:space="preserve" x="16" y="281.0">        <tspan fill="#c9d1d9">sessions</tspan><tspan fill="#c9d1d9">:</tspan>  <tspan fill="#ff7b72">cooperative</tspan><tspan fill="#c9d1d9">(</tspan><tspan fill="#ff7b72">pool</tspan> <tspan fill="#c9d1d9">=</tspan> <tspan fill="#c9d1d9">ws</tspan><tspan fill="#c9d1d9">)</tspan> <tspan fill="#ff7b72">where</tspan> <tspan fill="#c9d1d9">async_io</tspan><tspan fill="#c9d1d9">;</tspan>  <tspan fill="#8b949e">// 1 thread, 1000s of players</tspan></text>
<text xml:space="preserve" x="16" y="302.0">        <tspan fill="#c9d1d9">metrics</tspan><tspan fill="#c9d1d9">:</tspan>   <tspan fill="#ff7b72">cooperative</tspan><tspan fill="#c9d1d9">(</tspan><tspan fill="#ff7b72">pool</tspan> <tspan fill="#c9d1d9">=</tspan> <tspan fill="#c9d1d9">io</tspan><tspan fill="#c9d1d9">)</tspan><tspan fill="#c9d1d9">;</tspan>                 <tspan fill="#8b949e">// shares the io pool</tspan></text>
<text xml:space="preserve" x="16" y="323.0">        <tspan fill="#8b949e">// admin is unlisted -&gt; cooperative(pool = main)</tspan></text>
<text xml:space="preserve" x="16" y="344.0">    <tspan fill="#c9d1d9">}</tspan></text>
<text xml:space="preserve" x="16" y="365.0"></text>
<text xml:space="preserve" x="16" y="386.0">    <tspan fill="#ff7b72">bindings</tspan> <tspan fill="#c9d1d9">{</tspan></text>
<text xml:space="preserve" x="16" y="407.0">        <tspan fill="#8b949e">// PlayerInput: not listed -&gt; delivered by an in-process queue</tspan></text>
<text xml:space="preserve" x="16" y="428.0">        <tspan fill="#ffa657">MatchReady</tspan><tspan fill="#c9d1d9">:</tspan>    <tspan fill="#ff7b72">unix</tspan><tspan fill="#c9d1d9">(</tspan><tspan fill="#a5d6ff">&quot;/run/match.sock&quot;</tspan><tspan fill="#c9d1d9">)</tspan><tspan fill="#c9d1d9">;</tspan>                       <tspan fill="#8b949e">// AF_UNIX, role inferred</tspan></text>
<text xml:space="preserve" x="16" y="449.0">        <tspan fill="#ffa657">WorldSnapshot</tspan><tspan fill="#c9d1d9">:</tspan> <tspan fill="#ff7b72">shm_ring</tspan><tspan fill="#c9d1d9">(</tspan><tspan fill="#a5d6ff">&quot;/world&quot;</tspan><tspan fill="#c9d1d9">,</tspan> <tspan fill="#ff7b72">slot_count</tspan><tspan fill="#c9d1d9">:</tspan> <tspan fill="#79c0ff">1024</tspan><tspan fill="#c9d1d9">,</tspan> <tspan fill="#ff7b72">on_overflow</tspan><tspan fill="#c9d1d9">:</tspan> <tspan fill="#ff7b72">drop</tspan><tspan fill="#c9d1d9">)</tspan></text>
<text xml:space="preserve" x="16" y="470.0">                      <tspan fill="#ff7b72">where</tspan> <tspan fill="#ff7b72">intra_machine</tspan><tspan fill="#c9d1d9">,</tspan> <tspan fill="#ff7b72">zero_copy</tspan><tspan fill="#c9d1d9">;</tspan>                 <tspan fill="#8b949e">// shared-memory, no copy</tspan></text>
<text xml:space="preserve" x="16" y="491.0">        <tspan fill="#ffa657">ChatRelay</tspan><tspan fill="#c9d1d9">:</tspan>     <tspan fill="#ffa657">NatsAdapter</tspan> <tspan fill="#c9d1d9">{</tspan> <tspan fill="#c9d1d9">url</tspan><tspan fill="#c9d1d9">:</tspan> <tspan fill="#a5d6ff">&quot;nats://chat:4222&quot;</tspan> <tspan fill="#c9d1d9">}</tspan><tspan fill="#c9d1d9">;</tspan>       <tspan fill="#8b949e">// a locus you wrote</tspan></text>
<text xml:space="preserve" x="16" y="512.0">        <tspan fill="#ffa657">Replay</tspan><tspan fill="#c9d1d9">:</tspan>        <tspan fill="#ff7b72">unix</tspan><tspan fill="#c9d1d9">(</tspan><tspan fill="#a5d6ff">&quot;/run/replay.sock&quot;</tspan><tspan fill="#c9d1d9">)</tspan> <tspan fill="#c9d1d9">codec</tspan><tspan fill="#c9d1d9">(</tspan><tspan fill="#ffa657">JsonCodec</tspan> <tspan fill="#c9d1d9">{</tspan> <tspan fill="#c9d1d9">}</tspan><tspan fill="#c9d1d9">)</tspan><tspan fill="#c9d1d9">;</tspan> <tspan fill="#8b949e">// JSON on the wire</tspan></text>
<text xml:space="preserve" x="16" y="533.0">    <tspan fill="#c9d1d9">}</tspan></text>
<text xml:space="preserve" x="16" y="554.0"><tspan fill="#c9d1d9">}</tspan></text>
</svg>
