<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" role="img" aria-label="Aperio">
  <title>Aperio</title>
  <style>
    .mark { stroke: #0F6E56; fill: none; stroke-width: 1.4; }
    .dot { fill: #0F6E56; }
    @media (prefers-color-scheme: dark) {
      .mark { stroke: #F5F1E8; }
      .dot { fill: #F5F1E8; }
    }
  </style>
  <g transform="translate(40 40)" class="mark">
    <ellipse cx="0" cy="-23" rx="5.5" ry="12"/>
    <ellipse cx="0" cy="-23" rx="5.5" ry="12" transform="rotate(60)"/>
    <ellipse cx="0" cy="-23" rx="5.5" ry="12" transform="rotate(120)"/>
    <ellipse cx="0" cy="-23" rx="5.5" ry="12" transform="rotate(180)"/>
    <ellipse cx="0" cy="-23" rx="5.5" ry="12" transform="rotate(240)"/>
    <ellipse cx="0" cy="-23" rx="5.5" ry="12" transform="rotate(300)"/>
  </g>
  <circle cx="40" cy="40" r="3.5" class="dot"/>
</svg>
