name: tests

# Runs the full workspace test suite on every push (to any branch)
# and on every pull request targeting main. Pushing a feature
# branch is enough to delegate a full test run — no PR required.
# Linux-only at v1; the release workflow exercises macOS coverage
# at tag time.
#
# Uses cargo-nextest (drop-in replacement for `cargo test`) for
# smarter scheduling: each test runs in its own process, so the
# shared `/tmp/lotus_test_*` paths that historically required
# `--test-threads=1` no longer collide. Workspace-wide test time
# drops ~2-3x vs libtest.
#
# Build-and-run-per-partition shape: N parallel `test` jobs each
# build the workspace from the shared cargo cache and run a
# hash-partitioned subset (`cargo nextest run --partition`). There
# is deliberately NO separate compile-once `build` job + archive
# handoff: that serialized the run behind a full compile *and* an
# archive upload/download round-trip (~1.7min upload alone), and
# each partition still paid its own ~2min setup afterward. Folding
# the build into each partition overlaps the compile with the
# (already parallel) partitions and drops the round-trip — ~3-4min
# of wall-clock — at the cost of compiling ~Nx instead of once (the
# cargo cache keeps each warm build to ~3min). Wall-clock over CI
# minutes, for branch-iteration velocity.

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel an in-flight run on the same branch when a new push lands;
# tests on the older commit are already stale.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  LLVM_SYS_180_PREFIX: /usr/lib/llvm-18

jobs:
  test:
    name: test ${{ matrix.partition }}/4
    runs-on: ubuntu-latest
    strategy:
      # Don't short-circuit other partitions on first failure —
      # we want to see the full failure picture across the suite.
      fail-fast: false
      matrix:
        partition: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v4

      # Fixtures resolve via CARGO_MANIFEST_DIR against this checkout,
      # so build + run happen in-place with no path remap.
      - name: Free disk space
        uses: ./.github/actions/free-disk-space

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # Shared cache across the partitions (and reused run-to-run):
      # all four restore the same key, so each partition's build is
      # warm (~3min) rather than cold (~6.5min). One partition wins
      # the save at job end; the others skip with a harmless warning.
      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-tests-x86_64-linux-llvm18-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-tests-x86_64-linux-llvm18-

      - name: Install LLVM 18 + clang
        # llvm-sys links libLLVM.so.18 dynamically; clang-18 is also
        # invoked at test time to link compiled `.hl` fixtures.
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y \
            llvm-18-dev libpolly-18-dev libzstd-dev \
            clang-18 libclang-18-dev zlib1g-dev

      - name: Install cargo-nextest
        # Prebuilt binary — installs in seconds.
        uses: taiki-e/install-action@nextest

      - name: cargo build --release --workspace
        # Build ALL workspace members first so `libhale_ts_shim.a`
        # lands at `target/release/` before any test links against
        # it. `hale-cli` / `hale-codegen` tests invoke clang to link
        # compiled .hl fixtures — codegen appends the staticlib by
        # path-probe (no cargo dep edge forces it), so going straight
        # to `cargo test` misses it (`undefined reference to
        # lotus_ts_*`).
        run: cargo build --release --workspace

      - name: cargo nextest run (partition ${{ matrix.partition }}/4)
        # Build-and-run in one job (no separate archive job + upload/
        # download round-trip): nextest compiles the test binaries
        # reusing the build above + the cache, then runs this
        # partition's subset. `hash:I/N` partitions by test name — a
        # test always lands on the same partition, so a flake is
        # reproducible to its partition.
        run: |
          cargo nextest run \
            --release --workspace \
            --partition hash:${{ matrix.partition }}/4

  # 2026-05-26 — TSAN regression coverage for the lockfree
  # substrate paths. F.32-1γ-v2 + the substrate-race-fixes work
  # closed five originally-flagged TSAN races
  # (bus_queue_drain multi-thread flag, arena subregion mutex,
  # arena_destroy / coop_pool_worker ordering, lazy-init env
  # helpers via pthread_once) — the lockfree hashmap path
  # validates clean with an empty suppression list. This job
  # locks that in: any future regression that re-races on the
  # lockfree set / get / remove / grow paths fails CI here.
  #
  # Separate job because TSAN-instrumented binaries are ~5-15×
  # slower; running the full workspace under TSAN would gate
  # PRs on 30+ minute CI. The dedicated suite at
  # `crates/hale-codegen/tests/form_hashmap_lockfree_tsan.rs`
  # covers the substrate paths we care about + completes in
  # under a minute.
  tsan:
    name: tsan (form_hashmap_lockfree)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        uses: ./.github/actions/free-disk-space

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-tsan-x86_64-linux-llvm18-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-tsan-x86_64-linux-llvm18-

      - name: Install LLVM 18 + clang
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y \
            llvm-18-dev libpolly-18-dev libzstd-dev \
            clang-18 libclang-18-dev zlib1g-dev

      - name: cargo build --release --workspace
        # Build the whole workspace so `libhale_ts_shim.a` lands
        # at target/release/ before the test binaries try to
        # link against it — codegen tests invoke clang to link
        # compiled .hl programs, and the link surface includes
        # the ts-shim by path-probe (no cargo dep edge forces
        # it, so `-p hale-codegen` alone misses the staticlib
        # and clang errors with `undefined reference to lotus_ts_*`).
        run: cargo build --release --workspace

      - name: LOTUS_TSAN=1 cargo test (form_hashmap_lockfree_tsan)
        # The TSAN tests are #[ignore]'d so the normal suite
        # skips them; --ignored opts in. LOTUS_TSAN=1 in env
        # tells `build_executable` to pass -fsanitize=thread to
        # clang for both the runtime C compile and the binary
        # link. The C runtime's embedded
        # __tsan_default_suppressions returns empty as of
        # 2026-05-26 — any race surfaced here is a new
        # regression and gates the merge.
        env:
          LOTUS_TSAN: "1"
        run: |
          cargo test --release -p hale-codegen \
            --test form_hashmap_lockfree_tsan \
            -- --ignored --test-threads=1 --nocapture

  # 2026-06-02 — AddressSanitizer + LeakSanitizer coverage for the
  # compiled example corpus. The broad corpus is otherwise only
  # parse-tested + type-checked + interpreter-run (exit-0); the
  # interpreter has no arenas/pools/coros, so it can't surface the
  # teardown leaks, shutdown use-after-free, and buffer overflows
  # that keep appearing at feature intersections in real apps.
  # `corpus_oracle` compiles every runnable fixture to native and
  # runs it under the oracle battery; this job adds the sanitizer
  # arm. Three closure epoch-fire leaks are quarantined in the test
  # (KNOWN_CLOSURE_LEAKS) so the gate is green on the known state —
  # any NEW leak/UAF/overflow in any other fixture fails here.
  #
  # Separate job like tsan: ASAN-instrumented builds are slower and
  # need the wrap-malloc shim disabled, so they don't belong in the
  # normal partitions. The plain exit+deadline arm of corpus_oracle
  # DOES run in those partitions (no extra toolchain needed).
  asan:
    name: sanitizers (asan corpus + ubsan foreign-ring)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        uses: ./.github/actions/free-disk-space

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-asan-x86_64-linux-llvm18-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-asan-x86_64-linux-llvm18-

      - name: Install LLVM 18 + clang
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y \
            llvm-18-dev libpolly-18-dev libzstd-dev \
            clang-18 libclang-18-dev zlib1g-dev

      - name: cargo build --release --workspace
        run: cargo build --release --workspace

      - name: LOTUS_ASAN=1 cargo test (corpus_oracle under ASAN)
        # #[ignore]'d like the tsan suite; --ignored opts in.
        # LOTUS_ASAN=1 tells build_executable to pass
        # -fsanitize=address to clang for the runtime C compile +
        # binary link. A new leak outside KNOWN_CLOSURE_LEAKS, or
        # any UAF/overflow, gates the merge.
        env:
          LOTUS_ASAN: "1"
        run: |
          cargo test --release -p hale-codegen \
            --test corpus_oracle \
            -- --ignored --test-threads=1 --nocapture

      # 2026-06-08 — UBSan (+ASan) coverage for the foreign-ring
      # (`ring_layout`) boundary, folded into THIS job to reuse the
      # workspace build above (a separate job would redo the expensive
      # LLVM-linked release build for no benefit). `ring_layout` reads
      # rings written by another program, so the interesting failures
      # are at the non-conforming / hostile foreign-producer edge: a
      # record `len` that disagrees with the bound payload size, a
      # `buffer_size` that isn't an `align` multiple, a pack-read offset
      # near INT64_MAX. A review found three OOB holes there the normal
      # corpus never hit (it stays inside the safe invariants); this step
      # runs the suites that DO exercise those edges with LOTUS_UBSAN=1
      # (clang -fsanitize=address,undefined -fno-sanitize-recover), so a
      # signed-overflow / OOB / wrongful-dispatch regression aborts and
      # gates the merge. Scoped to the foreign-ring + pack tests on
      # purpose: a full-corpus UBSan run could surface unrelated latent
      # UB elsewhere (a separate effort). Leaks stay the ASan step's
      # remit (detect_leaks=0 here) so this stays focused on UB / OOB.
      - name: LOTUS_UBSAN=1 foreign-ring + pack suite (under ASan+UBSan)
        env:
          LOTUS_UBSAN: "1"
          UBSAN_OPTIONS: "print_stacktrace=1:halt_on_error=1"
          ASAN_OPTIONS: "detect_leaks=0"
        run: |
          cargo test --release -p hale-codegen \
            --test bytes_pack_read \
            --test shm_ring_layout \
            --test shm_ring_layout_producer \
            -- --test-threads=1 --nocapture

  # GH issue #18 item 2: model-check the substrate's concurrent
  # primitives under ALL C11 interleavings (not just the schedules a
  # test happens to hit). GenMC runs the actual C; a race / UAF /
  # assertion violation in any verification/*_model.c gates the merge.
  # No Rust/cargo — this job only needs LLVM 18 + cmake to build GenMC
  # and clang to run the models.
  genmc:
    name: genmc (substrate race-completeness)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        uses: ./.github/actions/free-disk-space

      - name: Install LLVM 18 + clang + cmake
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y \
            llvm-18-dev libpolly-18-dev libzstd-dev \
            clang-18 libclang-18-dev zlib1g-dev cmake

      # GenMC builds against LLVM 18 in a few minutes; cache the built
      # tree keyed on build_genmc.sh (which pins the GenMC commit), so
      # it only rebuilds when the pin / build recipe changes.
      - name: Cache GenMC build
        uses: actions/cache@v4
        with:
          path: ~/genmc
          key: genmc-llvm18-${{ hashFiles('verification/build_genmc.sh') }}

      # Build only if the cache missed OR restored a binary that no
      # longer runs (e.g. libLLVM patch bump under a stale cache).
      - name: Build GenMC if needed
        run: |
          set -eux
          if ! "$HOME/genmc/build/bin/genmc" --version >/dev/null 2>&1; then
            verification/build_genmc.sh "$HOME/genmc"
          fi

      - name: Run substrate model checks
        run: GENMC="$HOME/genmc/build/bin/genmc" verification/run_genmc.sh
