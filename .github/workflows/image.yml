name: image

# Build + push the public Hale toolchain image to GHCR so any repo's CI
# (including private ones) can compile `.hl` programs without installing
# LLVM 18 + the Rust toolchain. Mirrors release.yml's trigger: v* tags
# (versioned, stable images) plus manual dispatch for smoke-testing.
#
# One-time setup after the first push: open the GHCR package settings for
# `hale` and set visibility to Public. Public packages are pullable
# anonymously, so downstream private repos need no docker login.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: image-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive tags + labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
