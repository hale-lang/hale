name: tests

# Runs the full workspace test suite on every push to main and on
# every pull request targeting main. Linux-only at v1 — the
# release workflow exercises macOS coverage at tag time.
#
# Uses cargo-nextest (drop-in replacement for `cargo test`) for
# smarter scheduling: each test runs in its own process, so the
# shared `/tmp/lotus_test_*` paths that historically required
# `--test-threads=1` no longer collide. Workspace-wide test time
# drops ~2-3x vs libtest.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel an in-flight run on the same branch when a new push lands;
# tests on the older commit are already stale.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: cargo test --workspace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-tests-x86_64-linux-llvm18-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-tests-x86_64-linux-llvm18-

      - name: Install LLVM 18
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y \
            llvm-18-dev libpolly-18-dev libzstd-dev \
            clang-18 libclang-18-dev zlib1g-dev

      - name: Install cargo-nextest
        # Prebuilt binary — installs in seconds vs ~2min for
        # `cargo install`.
        uses: taiki-e/install-action@nextest

      - name: cargo build --release --workspace
        # Build ALL workspace members first so `libaperio_ts_shim.a`
        # lands at `target/release/` before any test that links
        # against it runs. `aperio-cli` and `aperio-codegen` tests
        # invoke clang to link compiled .ap fixtures — codegen
        # appends the staticlib by path-probe (no cargo dep edge
        # forces it), so a fresh checkout that goes straight to
        # `cargo test` misses the artifact and fails with
        # `undefined reference to lotus_ts_*`.
        env:
          LLVM_SYS_180_PREFIX: /usr/lib/llvm-18
        run: |
          set -eux
          cargo build --release --workspace

      - name: cargo nextest run --release --workspace
        env:
          LLVM_SYS_180_PREFIX: /usr/lib/llvm-18
        run: |
          set -eux
          cargo nextest run --release --workspace
