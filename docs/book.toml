[book]
title = "Hale"
authors = ["the Hale authors"]
description = "Hale language documentation — the level-by-level tour."
language = "en"
src = "src"

[output.html]
default-theme = "light"
preferred-dark-theme = "navy"
no-section-label = false
site-url = "/hale/"
git-repository-url = "https://github.com/hale-lang/hale"
edit-url-template = "https://github.com/hale-lang/hale/edit/main/docs/{path}"

[output.html.fold]
enable = true
level = 1

[output.html.search]
enable = true
limit-results = 30
